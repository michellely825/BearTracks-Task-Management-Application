<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>welcome</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div class="main">
      <h2 id="welcome-msg">Welcome<span id="name-span"></span>!</h2>

      <div class="choose-char">
        <button class="arrow-button">
          <img
            id="left-arrow"
            src="/src/images/arrows/arrow2.png"
            alt="arrow button"
          />
        </button>
        <img
          src="/src/images/characters/bear12.png"
          alt="character"
          id="character-img"
        />
        <button class="arrow-button">
          <img
            id="right-arrow"
            src="/src/images/arrows/arrow2.png"
            alt="arrow button"
          />
        </button>
      </div>

      <div class="name-input-and-button">
        <input type="text" id="name-input" placeholder="Enter your name" />
        <button class="button" id="done-button">Done</button>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
