<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>michy's big brain to-do list</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/dashboard.css" />
  </head>
  <body>
    <button id="back-button">back</button>
    <div class="main" id="to-do-page">
      <div id="top">
        <div id="char-img-frame">
          <img id="user-char-img" src="" alt="selected character image" />
        </div>
        <!-- <h2><span id="username-span"></span></h2> -->
        <h2>Hi <span id="username-span"></span>!</h2>
        <!-- <h3>Here is your dashboard:</h3> -->
      </div>

      <div id="task-input-and-button">
        <input id="task-input" type="text" placeholder="Add your task..." />
        <button class="button" id="add-button">Add</button>
      </div>

      <div class="lists">
        <div id="incomplete-task-div">
          <h4>Tasks</h4>
          <ul id="incomplete-task-list"></ul>
        </div>
        <div id="complete-task-div">
          <h4>Completed (<span id="complete-tasks-count-span">0</span>)</h4>
          <ul id="completed-task-list"></ul>
        </div>
      </div>
    </div>
    <script src="dashboard.js"></script>
  </body>
</html>
