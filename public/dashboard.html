<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>michy's big brain to-do list</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/dashboard.css" />
  </head>
  <body>
    <div class="pop-up">
      <header>
        <button id="sign-out-button" class="button">Sign Out</button>
        <div id="user-info-section">
          <div id="user-profile-frame">
            <img id="user-profile-img" src="" alt="selected character image" />
          </div>
          <div id="greeting-text">
            <h2>Hi <span id="username-span"></span>!<span></span></h2>
            <h3 id="encouraging-msg">Ready to conquer the day?</h3>
          </div>
        </div>

        <div id="task-input-and-button">
          <input id="task-input" type="text" placeholder="Add your task..." />
          <button class="button" id="add-button">Add</button>
        </div>
      </header>
      <main>
        <div id="incomplete-task-div">
          <h4>Tasks</h4>
          <ul id="incomplete-task-list"></ul>
        </div>
        <div id="complete-task-div">
          <h4>Completed (<span id="complete-tasks-count-span">0</span>)</h4>
          <ul id="completed-task-list"></ul>
        </div>
      </main>
    </div>
    <script src="dashboard.js"></script>
  </body>
</html>
