<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorization Page</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/auth.css" />
  </head>
  <body>
    <div class="pop-up" id="log-in">
      <h2>Welcome Back!</h2>
      <form class="form" id="log-in-form">
        <h4 class="error-msg hidden" id="login-error-msg"></h4>
        <label for="log-in-username">Username: </label>
        <input type="text" id="log-in-username" required />
        <label for="log-in-password">Password: </label>
        <input type="password" id="log-in-password" required />
        <button type="submit" class="button" id="log-in-button">Log in</button>
      </form>
      <div class="switch">
        <h5>Don't have an account?</h5>
        <button id="switch-to-signup-button">Sign up</button>
      </div>
    </div>

    <div class="pop-up" id="sign-up">
      <h2 id="create-an-acc-msg">Create an Account</h2>
      <form class="form" id="sign-up-form">
        <h4 class="error-msg hidden" id="signup-error-msg"></h4>
        <label for="sign-up-username">Username: </label>
        <input type="text" id="sign-up-username" required />
        <label for="sign-up-password">Password: </label>
        <input type="password" id="sign-up-password" required />
        <div class="character-selector">
          <button type="button" class="arrow-button">
            <img
              id="left-arrow"
              src="/src/images/arrows/arrow2.png"
              alt="arrow button"
            />
          </button>
          <img
            src="/src/images/characters/bear12.png"
            alt="character"
            id="character-img"
          />
          <button type="button" class="arrow-button">
            <img
              id="right-arrow"
              src="/src/images/arrows/arrow2.png"
              alt="arrow button"
            />
          </button>
        </div>
        <input type="hidden" name="character" id="character-input" value="" />

        <button type="submit" class="button" id="sign-up-button">
          Sign up
        </button>
      </form>

      <div class="switch">
        <h5>Already have an account?</h5>
        <button id="switch-to-login-button">Log in</button>
      </div>
    </div>

    <script src="/src/auth.js"></script>
  </body>
</html>
