<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorization Page</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div class="main" id="log-in">
      <h1>Welcome Back!</h1>
      <form name="log-in-form" method="post" action="">
        <div class="form-group">
          <label for="log-in-name">Username: </label>
          <input type="text" id="log-in-name" />
        </div>
        <div class="form-group">
          <label for="log-in-password">Password: </label>
          <input type="password" id="log-in-password" />
        </div>
        <button type="submit">Log in</button>
        <div class="switch">
          <h5>Don't have an account?</h5>
          <button id="switch-to-signup-button">Sign up</button>
        </div>
      </form>
    </div>
    <div class="main" id="sign-up">
      <h1>Sign up</h1>
      <form name="sign-up-form" method="post" action="">
        <div class="form-group">
          <label for="sign-up-name">Username: </label>
          <input type="text" id="sign-up-name" />
        </div>
        <div class="form-group">
          <label for="sign-up-password">Password: </label>
          <input type="password" id="sign-up-password" />
        </div>
        <div class="choose-char">
          <h5>Choose a character:</h5>
          <button class="arrow-button">
            <img
              id="left-arrow"
              src="/src/images/arrows/arrow2.png"
              alt="arrow button"
            />
          </button>
          <img
            src="/src/images/characters/bear12.png"
            alt="character"
            id="character-img"
          />
          <button class="arrow-button">
            <img
              id="right-arrow"
              src="/src/images/arrows/arrow2.png"
              alt="arrow button"
            />
          </button>
        </div>

        <button type="submit">Sign up</button>
        <div class="switch">
          <h5>Already haven an account?</h5>
          <button id="switch-to-login-button">Log in</button>
        </div>
      </form>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
