<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorization Page</title>
    <style src="/src/styles/main.css"></style>
  </head>
  <body>
    <div class="main" id="log-in">
      <h1>Welcome Back!</h1>
      <form name="log-in-form" method="post" action="">
        <div class="form-group">
          <label for="sign-in-name">Username: </label>
          <input type="text" id="sign-in-name" />
        </div>
        <div class="form-group">
          <label for="sign-in-password">Password: </label>
          <input type="password" id="sign-in-password" />
        </div>
        <button type="submit">Log in</button>
        <div class="switch">
          <h5>Don't have an account?</h5>
          <button id="switch-to-signup-button">Sign up</button>
        </div>
      </form>
    </div>
    <div class="main" id="sign-up">
      <h1>Sign up</h1>
      <form name="sign-up-form" method="post" action="">
        <div class="form-group">
          <label for="sign-up-name">Username: </label>
          <input type="text" id="sign-up-name" />
        </div>
        <div class="form-group">
          <label for="sign-up-password">Password: </label>
          <input type="password" id="sign-up-password" />
        </div>
        <button type="submit">Sign up</button>
        <div class="switch">
          <h5>Already haven an account?</h5>
          <button id="switch-to-login-button">Log in</button>
        </div>
      </form>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
