<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>michy's big brain to-do list</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="pop-up">
      <button id="back-button">back</button>
      <h3>DoDashBoard</h3>
      <div id="task-input-and-button">
        <input id="task-input" type="text" placeholder="Add your task..." />
        <button id="add-button">Add</button>
      </div>
      <h4>Tasks:</h4>
      <ul class="task-list" id="incomplete-tasks"></ul>
      <h4>Completed:</h4>
      <ul class="task-list" id="completed-tasks"></ul>
    </div>
    <script src="todo.js"></script>
  </body>
</html>
